services:
  # ─── Django Backend ──────────────────────────────────────────────────────────
  - type: web
    name: ds-vault-backend
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/auth/health/
    envVars:
      - key: SECRET_KEY
        generateValue: true                  # Render auto-generates a secure random value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "ds-vault-backend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ds-vault-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ds-vault-frontend.onrender.com"
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false                          # Set manually in Render dashboard
      - key: EMAIL_HOST_PASSWORD
        sync: false                          # Set manually in Render dashboard

  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: ds-vault-db
    plan: free
    databaseName: dsvault
    user: dsvault_user
